<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiPrices — Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-brand">
            <div><img src="Pictures/logo-primary.png" alt="DigiPrices Logo" class="logo-login"></div>
            <p>Display Management System</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required />
            </div>
            <div class="form-error" id="loginError" style="display:none;">
                Invalid username or password.
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>

</html>
